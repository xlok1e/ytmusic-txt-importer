name: Build & Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller ytmusic_importer.spec --distpath dist --workpath build --noconfirm

      - name: Zip .app
        run: |
          cd dist
          zip -r "YTMusic.Importer.macOS.zip" "YTMusic Importer.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YTMusic.Importer.macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller ytmusic_importer.spec --distpath dist --workpath build --noconfirm

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/YTMusic Importer.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
